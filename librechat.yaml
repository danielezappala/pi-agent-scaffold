version: 1.3.5
cache: true
endpoints:
  custom:
    - name: "Pi Agent"
      apiKey: "none"
      baseURL: "http://host.docker.internal:3001/v1"
      models:
        default: ["pi-agent"]
        fetch: false
      titleConvo: true
      titleModel: "pi-agent"
      modelDisplayLabel: "Pi Agent"
      dropParams: ["user", "frequency_penalty", "presence_penalty"]
    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "${OLLAMA_HOST:-http://host.docker.internal:11434}/v1"
      models:
        default: ["llama3.2", "mistral", "phi4"]
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      modelDisplayLabel: "Ollama"
      dropParams: ["user"]
