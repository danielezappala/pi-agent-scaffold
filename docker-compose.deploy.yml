services:
  librechat:
    depends_on:
      - mongodb
      - pi-agent
    volumes:
      - ./librechat.deploy.yaml:/app/librechat.yaml:ro

  pi-agent:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/v1/models').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
